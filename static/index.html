<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChallengeSignIn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>

    <main>
      <header class="brand">
        <h1>ChallengeSignIn</h1>
        <p>Sign in with Web Crypto keys stored in OPFS.</p>
      </header>

      <section class="panel" aria-labelledby="panel-title">
        <h2 id="panel-title" class="visually-hidden">Authenticate</h2>

        <div id="guest-view">
          <div class="mode-switch" role="tablist" aria-label="Choose an action">
            <button
              type="button"
              class="mode-btn"
              role="tab"
              id="mode-create"
              aria-selected="true"
              aria-controls="create-panel"
              data-mode="create"
            >
              Create account
            </button>
            <button
              type="button"
              class="mode-btn"
              role="tab"
              id="mode-signin"
              aria-selected="false"
              aria-controls="signin-panel"
              data-mode="signin"
              tabindex="-1"
            >
              Sign in
            </button>
          </div>

          <div id="create-panel" role="tabpanel" aria-labelledby="mode-create">
            <p class="hint">
              Pick a username, then create an ECDSA key pair on this device.
            </p>
            <form id="create-form">
              <label for="username">
                <span>Username</span>
                <input
                  id="username"
                  name="username"
                  autocomplete="username"
                  placeholder="choose a username"
                  required
                  autofocus
                />
              </label>
              <button type="submit" class="primary">Register</button>
            </form>
          </div>

          <div
            id="signin-panel"
            role="tabpanel"
            aria-labelledby="mode-signin"
            hidden
          >
            <p class="hint">
              Sign a server challenge with your OPFS private key.
            </p>
            <button id="login-btn" type="button" class="primary">
              Sign in
            </button>
          </div>
        </div>

        <div id="session-view" hidden>
          <div class="session-card" aria-live="polite">
            <span class="session-avatar" id="session-avatar" aria-hidden="true"
              >?</span
            >
            <div class="session-copy">
              <p class="session-label">Signed in</p>
              <p class="session-name" id="session-name"></p>
            </div>
          </div>
          <button id="logout-btn" type="button" class="secondary">
            Sign out
          </button>
        </div>

        <output id="status" class="status" data-tone="idle" aria-live="polite"
          >Ready</output
        >
      </section>
    </main>
  </body>
</html>
